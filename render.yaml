services:
  # Servicio web principal
  - type: web
    name: pagoadministrativojelp
    runtime: image
    buildCommand: |
      echo "🚀 Preparando proyecto..."
      mkdir -p admin/data
      chmod 755 admin/data
    startCommand: |
      echo "🚀 Iniciando servidor..."
      php -S 0.0.0.0:10000 -t .
    envVars:
      - key: PHP_VERSION
        value: 8.2

  # Cron Job - Mantiene la app activa cada 10 minutos
  - type: cron
    name: keep-alive
    schedule: "*/10 * * * *"
    buildCommand: |
      echo "FROM alpine:latest" > Dockerfile
      echo "RUN apk add --no-cache curl" >> Dockerfile
      echo "CMD curl -s https://pagoadministrativojelp.onrender.com/cron.php > /dev/null" >> Dockerfile
